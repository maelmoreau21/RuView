services:
  sensing-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.rust
    image: ruvnet/wifi-densepose:latest
    ports:
      - "3000:3000"
      - "3001:3001"
      - "5005:5005/udp"
    environment:
      - RUST_LOG=info
      # Production default is real ESP32 CSI. Use CSI_SOURCE=auto to probe
      # hardware first and remain offline if absent. Dev/test simulation must
      # be explicit: CSI_SOURCE=simulate and RUVSENSE_ENABLE_SIMULATION=true.
      - CSI_SOURCE=${CSI_SOURCE:-esp32}
      - RUVSENSE_ENABLE_SIMULATION=${RUVSENSE_ENABLE_SIMULATION:-false}
      - MODELS_DIR=${MODELS_DIR:-data/models}

  python-sensing:
    build:
      context: ..
      dockerfile: docker/Dockerfile.python
    image: ruvnet/wifi-densepose:python
    profiles: ["legacy-python"]
    ports:
      - "8765:8765"
      - "8080:8080"
    environment:
      - PYTHONUNBUFFERED=1
