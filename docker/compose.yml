name: ruvsense-edge

services:
  ruvsense-master:
    build:
      context: ..
      dockerfile: docker/Dockerfile.master
    image: ghcr.io/maelmoreau21/ruvsense-edge-master:local
    container_name: ruvsense-master
    restart: unless-stopped
    ports:
      - "${RUVSENSE_HTTP_PORT:-3000}:${RUVSENSE_HTTP_PORT:-3000}"
      - "${RUVSENSE_WS_PORT:-3001}:${RUVSENSE_WS_PORT:-3001}"
      - "${RUVSENSE_UDP_PORT:-5005}:${RUVSENSE_UDP_PORT:-5005}/udp"
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      CSI_SOURCE: ${CSI_SOURCE:-esp32}
      RUVSENSE_ENABLE_SIMULATION: ${RUVSENSE_ENABLE_SIMULATION:-false}
      RUVSENSE_HTTP_PORT: ${RUVSENSE_HTTP_PORT:-3000}
      RUVSENSE_WS_PORT: ${RUVSENSE_WS_PORT:-3001}
      RUVSENSE_UDP_PORT: ${RUVSENSE_UDP_PORT:-5005}
      RUVSENSE_MIN_NODES: ${RUVSENSE_MIN_NODES:-1}
      RUVSENSE_WIFI_INTERFACE: ${RUVSENSE_WIFI_INTERFACE:-wlan0}
      RUVSENSE_AP_SCAN_INTERVAL_SECS: ${RUVSENSE_AP_SCAN_INTERVAL_SECS:-10}
      RUVSENSE_DATA_DIR: /var/lib/ruvsense
      MODELS_DIR: /var/lib/ruvsense/models
      RUVIEW_API_TOKEN: ${RUVIEW_API_TOKEN:-}
    volumes:
      - ../data/ruvsense:/var/lib/ruvsense
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${RUVSENSE_HTTP_PORT:-3000}/health/live >/dev/null || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 8
      start_period: 20s

  mqtt:
    image: eclipse-mosquitto:2.0
    profiles: ["home"]
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ../data/mosquitto:/mosquitto/data

  legacy-python:
    build:
      context: ..
      dockerfile: docker/Dockerfile.python
    image: ruvnet/wifi-densepose:python
    profiles: ["legacy-python"]
    ports:
      - "8765:8765"
      - "8080:8080"
    environment:
      PYTHONUNBUFFERED: "1"

  prometheus:
    image: prom/prometheus:latest
    profiles: ["monitoring"]
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.ruvsense.yml:/etc/prometheus/prometheus.yml:ro
