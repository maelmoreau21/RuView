[stable]
presence_detection = true
motion_detection = true
breathing_rate = true
zone_localization = true
fall_detection = true

[beta]
# Ces features sont experimentales et desactivees par defaut
# Mettre a true pour activer a vos risques et perils
skeleton_pose_estimation = false
cardiac_arrest_detection = false
precise_heart_rate = false
precise_person_counting = false
densepose_3d = false

[alert_thresholds]
apnea_trigger_seconds = 15
apnea_min_confidence = 0.30
no_motion_trigger_seconds = 120
presence_score_threshold = 0.70
motion_energy_threshold = 0.02
