<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0e1a">
  <meta name="description" content="Console live RuvSense Edge">
  <title>RuvSense</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="app-header">
    <div class="brand" aria-label="Etat de connexion RuvSense">
      <span id="connection-dot" class="status-dot is-offline" aria-hidden="true"></span>
      <span class="brand-name">RuvSense</span>
    </div>
    <div class="live-strip" aria-live="polite">
      <span id="live-badge" class="live-badge is-offline">HORS LIGNE</span>
      <span id="active-node-summary" class="active-node-summary">--</span>
    </div>
    <div class="header-actions">
      <button id="settings-button" class="settings-button" type="button" title="Paramètres" aria-label="Paramètres" onclick="window.open('settings.html', '_blank')">⚙️ Paramètres</button>
      <button id="view-3d-button" class="view-3d-button" type="button">Vue 3D 🔭</button>
      <time id="header-clock" class="header-clock" datetime="">--:--:--</time>
    </div>
  </header>

  <main class="app-layout">
    <aside class="left-column" aria-label="Noeuds et systeme">
      <section class="panel-section" aria-labelledby="nodes-title">
        <h2 id="nodes-title" class="section-title">NŒUDS</h2>
        <div id="nodes-list" class="card-stack" aria-live="polite"></div>
      </section>

      <section class="panel-section" aria-labelledby="system-title">
        <h2 id="system-title" class="section-title">SYSTÈME</h2>
        <div class="card system-card">
          <dl class="metric-list">
            <div>
              <dt>Version</dt>
              <dd id="system-version">--</dd>
            </div>
            <div>
              <dt>Uptime</dt>
              <dd id="system-uptime">--</dd>
            </div>
            <div>
              <dt>Frames CSI</dt>
              <dd id="system-frame-count">--</dd>
            </div>
            <div>
              <dt>Mode</dt>
              <dd><span id="system-mode" class="mode-badge is-empty">--</span></dd>
            </div>
          </dl>
        </div>
      </section>

      <section class="panel-section" aria-labelledby="actions-title">
        <h2 id="actions-title" class="section-title">ACTIONS</h2>
        <div class="card action-card">
          <button id="recalibrate-button" class="outline-button" type="button">Recalibrer</button>
          <button id="reload-modules-button" class="outline-button" type="button">Recharger modules</button>
          <div id="action-status" class="action-status" aria-live="polite">--</div>
        </div>
      </section>
    </aside>

    <section class="room-column" aria-labelledby="room-title">
      <div class="room-stage">
        <h1 id="room-title" class="room-title">VUE DE LA PIÈCE</h1>
        <div id="room-config-banner" class="room-config-banner" role="status" hidden>⚠️ Positions des nœuds non configurées — cliquez sur ⚙️ Paramètres</div>
        <canvas id="room-canvas" class="room-canvas" aria-label="Vue de dessus de la piece"></canvas>
        <div id="person-halos" class="person-halos" aria-hidden="true"></div>
      </div>
    </section>

    <aside class="right-column" aria-label="Vitaux alertes tendances">
      <section class="panel-section" aria-labelledby="vitals-title">
        <h2 id="vitals-title" class="section-title">VITAUX</h2>
        <div id="vitals-list" class="card-stack" aria-live="polite"></div>
      </section>

      <section class="panel-section alerts-section" aria-labelledby="alerts-title">
        <div class="section-row">
          <h2 id="alerts-title" class="section-title">ALERTES</h2>
          <span id="alerts-count" class="alert-count">0</span>
        </div>
        <div id="alerts-list" class="alerts-list" aria-live="polite"></div>
        <button id="clear-alerts-button" class="clear-alerts-button" type="button">Tout effacer</button>
      </section>

      <section class="panel-section" aria-labelledby="trends-title">
        <div class="section-row">
          <h2 id="trends-title" class="section-title">TENDANCES</h2>
          <button id="trend-tab-breathing" class="trend-tab is-active" type="button">Respiration</button>
        </div>
        <div class="card trends-card">
          <canvas id="trends-canvas" class="trends-canvas" width="240" height="80" aria-label="Tendance respiration sur 10 minutes"></canvas>
        </div>
      </section>
    </aside>
  </main>

  <script src="state.js"></script>
  <script src="api.js"></script>
  <script type="module" src="alerts.js"></script>
  <script src="websocket.js"></script>
  <script>
    (() => {
      const EMPTY_ROOM_CONFIG = {
        version: 2,
        room: { shape: 'polygon', boundary: [] },
        nodes: [],
      };
      const ROOM_CANVAS_MARGIN = 40;

      const els = {};
      const trails = new Map();
      const zeroBreathingSince = new Map();
      const nodeProjectionLogKeys = new Map();
      let canvasMetrics = null;
      let trendMode = 'breathing';
      let lastRenderAt = 0;
      let roomResizeObserver = null;

      function $(id) {
        return document.getElementById(id);
      }

      function getElements() {
        [
          'connection-dot',
          'live-badge',
          'active-node-summary',
          'view-3d-button',
          'settings-button',
          'header-clock',
          'nodes-list',
          'system-version',
          'system-uptime',
          'system-frame-count',
          'system-mode',
          'recalibrate-button',
          'reload-modules-button',
          'action-status',
          'room-config-banner',
          'room-canvas',
          'person-halos',
          'vitals-list',
          'alerts-count',
          'alerts-list',
          'clear-alerts-button',
          'trends-canvas',
          'trend-tab-breathing',
        ].forEach((id) => {
          els[id] = $(id);
        });
      }

      function dispatchUpdate() {
        window.dispatchEvent(new CustomEvent('rs:update'));
      }

      function formatClock(date = new Date()) {
        return date.toLocaleTimeString('fr-FR', {
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit',
          hour12: false,
        });
      }

      function updateClock() {
        const now = new Date();
        els['header-clock'].textContent = formatClock(now);
        els['header-clock'].dateTime = now.toISOString();
      }

      function safeNumber(value) {
        const n = Number(value);
        return Number.isFinite(n) ? n : null;
      }

      function normalizeId(value) {
        return String(value ?? '').toLowerCase().replace(/[^a-z0-9]/g, '');
      }

      function normalizeNodeId(value) {
        const raw = String(value ?? '').trim();
        if (!raw) return '';
        const numeric = Number(raw);
        return Number.isFinite(numeric) ? String(numeric) : raw;
      }

      function nodeIdFrom(node, fallback = null) {
        return normalizeNodeId(node?.node_id ?? node?.id ?? fallback);
      }

      function pointFrom(value) {
        const x = safeNumber(value?.x);
        const y = safeNumber(value?.y);
        return x == null || y == null ? null : { x, y };
      }

      function normalizeRoomConfig(config) {
        if (!config || config.version !== 2 || config.room?.shape !== 'polygon') return null;
        const boundary = Array.isArray(config.room.boundary)
          ? config.room.boundary.map(pointFrom).filter(Boolean)
          : [];
        if (boundary.length < 3) return null;

        const nodes = Array.isArray(config.nodes)
          ? config.nodes.map((node) => {
            const point = pointFrom(node);
            if (!node || node.id == null || !point) return null;
            return {
              id: node.id,
              x: point.x,
              y: point.y,
              active: node.active !== false,
            };
          }).filter(Boolean)
          : [];

        return {
          version: 2,
          room: { shape: 'polygon', boundary },
          nodes,
        };
      }

      function roomConfig() {
        return window.RS.room_config || EMPTY_ROOM_CONFIG;
      }

      function roomBoundary() {
        const boundary = roomConfig().room?.boundary;
        return Array.isArray(boundary) ? boundary.map(pointFrom).filter(Boolean) : [];
      }

      function roomBounds(boundary = roomBoundary()) {
        if (!boundary.length) return null;
        const xs = boundary.map((point) => point.x);
        const ys = boundary.map((point) => point.y);
        const minX = Math.min(...xs);
        const minY = Math.min(...ys);
        const maxX = Math.max(...xs);
        const maxY = Math.max(...ys);
        return {
          minX,
          minY,
          maxX,
          maxY,
          width: Math.max(0.001, maxX - minX),
          height: Math.max(0.001, maxY - minY),
        };
      }

      function configuredNodes() {
        const nodes = roomConfig().nodes;
        return Array.isArray(nodes) ? nodes : [];
      }

      function liveNodesById() {
        const nodesById = new Map();
        Object.entries(window.RS.nodes || {}).forEach(([key, node]) => {
          const id = nodeIdFrom(node, key);
          if (!id) return;
          const previous = nodesById.get(id) || {};
          nodesById.set(id, {
            ...previous,
            ...node,
            id: node?.id ?? previous.id ?? id,
            node_id: node?.node_id ?? previous.node_id ?? id,
          });
        });
        return nodesById;
      }

      function nodesByIdForUi() {
        const nodesById = new Map();
        const liveById = liveNodesById();

        configuredNodes().forEach((node, index) => {
          const id = nodeIdFrom(node, index + 1);
          if (!id) return;
          nodesById.set(id, {
            node_id: id,
            config: {
              ...node,
              id: node.id ?? id,
              node_id: node.node_id ?? id,
            },
            state: liveById.get(id) || { active: node.active === true },
            configured: true,
            index: nodesById.size,
          });
        });

        liveById.forEach((node, id) => {
          if (nodesById.has(id)) return;
          nodesById.set(id, {
            node_id: id,
            config: {
              id,
              node_id: id,
              label: node.label || node.name || `Node ${id}`,
              x: node.x,
              y: node.y,
            },
            state: node,
            configured: false,
            index: nodesById.size,
          });
        });

        return nodesById;
      }

      function allNodesForUi() {
        return [...nodesByIdForUi().values()].map((entry, index) => ({
          ...entry,
          index,
        }));
      }

      function isNodeActive(nodeState) {
        if (!nodeState) return false;
        if (nodeState.active === false) return false;
        const seenAt = lastSeenMs(nodeState);
        if (seenAt == null) return Boolean(nodeState.active);
        return Date.now() - seenAt <= 10000;
      }

      function lastSeenMs(nodeState) {
        if (!nodeState) return null;
        const raw = nodeState.last_seen ?? nodeState.lastSeen ?? nodeState.last_frame_at ?? nodeState.last_frame_ms;
        if (raw == null || raw === '') return null;
        if (typeof raw === 'number') {
          if (raw > 100000000000) return raw;
          if (raw > 1000000000) return raw * 1000;
          return Date.now() - raw;
        }
        const parsed = Date.parse(raw);
        return Number.isFinite(parsed) ? parsed : null;
      }

      function ageLabel(nodeState) {
        const seenAt = lastSeenMs(nodeState);
        if (seenAt == null) return '--';
        const age = Math.max(0, Date.now() - seenAt);
        if (age < 1000) return `${Math.round(age)}ms`;
        return `${(age / 1000).toFixed(age < 10000 ? 1 : 0)}s`;
      }

      function freshnessClass(nodeState) {
        const seenAt = lastSeenMs(nodeState);
        if (seenAt == null) return 'is-red';
        const age = Date.now() - seenAt;
        return nodeState?.active === true && age <= 10000 ? 'is-green' : 'is-red';
      }

      function rssiSegments(rssi) {
        const value = safeNumber(rssi);
        if (value == null) return 0;
        if (value >= -50) return 5;
        if (value >= -60) return 4;
        if (value >= -70) return 3;
        if (value >= -80) return 2;
        return 1;
      }

      function displayNodeName(entry) {
        return entry.config.label || entry.config.name || `Node ${entry.node_id || entry.index + 1}`;
      }

      function nodeAlertName(entry) {
        const id = String(entry.node_id ?? entry.config.id ?? entry.index + 1);
        const numeric = id.match(/\d+/)?.[0];
        return `Node ${numeric || id}`;
      }

      function nodeShortLabel(entry) {
        const id = entry.node_id ?? entry.config.id ?? entry.config.node_id ?? entry.index + 1;
        const numeric = String(id).match(/\d+/)?.[0];
        return numeric ? `N${numeric}` : String(id || `N${entry.index + 1}`);
      }

      function nodeIndicatorClass(entry, nodeState) {
        if (!nodeState) return 'is-red';
        return isNodeActive(nodeState) ? 'is-green' : freshnessClass(nodeState);
      }

      function nodePosition(entry) {
        const config = entry?.config || {};
        const state = entry?.state || {};
        const x = safeNumber(
          config.x
          ?? state.x
        );
        const y = safeNumber(
          config.y
          ?? state.y
        );
        return x == null || y == null ? null : { x, y };
      }

      function isPointOnSegment(x, y, a, b) {
        const cross = (y - a.y) * (b.x - a.x) - (x - a.x) * (b.y - a.y);
        if (Math.abs(cross) > 0.000001) return false;
        const dot = (x - a.x) * (b.x - a.x) + (y - a.y) * (b.y - a.y);
        if (dot < 0) return false;
        const lengthSq = ((b.x - a.x) ** 2) + ((b.y - a.y) ** 2);
        return dot <= lengthSq;
      }

      function isPointInPolygon(x, y, boundary = roomBoundary()) {
        if (boundary.length < 3) return false;
        let inside = false;
        for (let i = 0, j = boundary.length - 1; i < boundary.length; j = i, i += 1) {
          const current = boundary[i];
          const previous = boundary[j];
          if (isPointOnSegment(x, y, previous, current)) return true;
          const intersects = ((current.y > y) !== (previous.y > y))
            && (x < ((previous.x - current.x) * (y - current.y)) / (previous.y - current.y) + current.x);
          if (intersects) inside = !inside;
        }
        return inside;
      }

      function isOutsideConfiguredRoom(x, y, boundary = roomBoundary()) {
        return !isPointInPolygon(x, y, boundary);
      }

      function nodeOutsideConfiguredRoom(entry) {
        const position = nodePosition(entry);
        return Boolean(position && isOutsideConfiguredRoom(position.x, position.y));
      }

      function outOfBoundsArrow(x, y, bounds = canvasMetrics?.bounds) {
        if (!bounds) return '';
        if (x < bounds.minX || x > bounds.maxX) return '→';
        if (y < bounds.minY || y > bounds.maxY) return '↑';
        return '';
      }

      function activeNodesWithPositions(nodes = allNodesForUi()) {
        return nodes
          .filter((entry) => isNodeActive(entry.state))
          .map((entry) => ({ entry, position: nodePosition(entry) }))
          .filter((item) => item.position);
      }

      function zoomToFitBounds(nodes, roomW, roomH) {
        const activePositioned = activeNodesWithPositions(nodes);
        if (!activePositioned.length) return { originX: 0, originY: 0, roomW, roomH, zoomed: false };
        const allOutside = activePositioned.every(({ position }) => (
          isOutsideConfiguredRoom(position.x, position.y, roomW, roomH)
        ));
        if (!allOutside) return { originX: 0, originY: 0, roomW, roomH, zoomed: false };

        const xs = activePositioned.map(({ position }) => position.x);
        const ys = activePositioned.map(({ position }) => position.y);
        const originX = Math.min(0, ...xs);
        const originY = Math.min(0, ...ys);
        const maxX = Math.max(roomW, ...xs);
        const maxY = Math.max(roomH, ...ys);
        return {
          originX,
          originY,
          roomW: Math.max(1, maxX - originX),
          roomH: Math.max(1, maxY - originY),
          zoomed: true,
        };
      }

      function logNodeProjection(entry, x, y, px, py) {
        if (!canvasMetrics) return;
        const id = entry.node_id ?? entry.config?.id ?? entry.index + 1;
        const key = [
          id,
          x.toFixed(3),
          y.toFixed(3),
          px.toFixed(1),
          py.toFixed(1),
          canvasMetrics.canvasWidth,
          canvasMetrics.canvasHeight,
          canvasMetrics.configRoomW,
          canvasMetrics.configRoomH,
        ].join('|');
        if (nodeProjectionLogKeys.get(id) === key) return;
        nodeProjectionLogKeys.set(id, key);
        console.log(
          'Node', id,
          'pos metres:', x, y,
          'pos pixels:', px, py,
          'canvas size:', canvasMetrics.canvasWidth, canvasMetrics.canvasHeight,
          'room config:', canvasMetrics.configRoomW, canvasMetrics.configRoomH,
        );
      }

      function setStatus() {
        const connected = Boolean(window.RS.connected);
        els['connection-dot'].classList.toggle('is-online', connected);
        els['connection-dot'].classList.toggle('is-offline', !connected);
        els['live-badge'].classList.toggle('is-online', connected);
        els['live-badge'].classList.toggle('is-offline', !connected);
        els['live-badge'].textContent = connected ? 'LIVE' : 'HORS LIGNE';

        const activeNames = allNodesForUi()
          .filter((entry) => isNodeActive(entry.state))
          .map(displayNodeName);
        els['active-node-summary'].textContent = activeNames.length ? activeNames.join(', ') : '--';
      }

      function renderNodes() {
        const nodes = allNodesForUi();
        els['nodes-list'].replaceChildren();

        if (!nodes.length) {
          const card = document.createElement('article');
          card.className = 'card node-card';
          card.textContent = '--';
          els['nodes-list'].append(card);
          return;
        }

        nodes.forEach((entry) => {
          const node = entry.state;
          const active = isNodeActive(node);
          const rssi = node ? safeNumber(node.rssi ?? node.rssi_dbm ?? node.signal) : null;
          const filled = rssiSegments(rssi);
          const outsideConfiguredRoom = nodeOutsideConfiguredRoom(entry);

          const card = document.createElement('article');
          card.className = 'card node-card';
          if (outsideConfiguredRoom) card.classList.add('is-aging');
          else if (!entry.configured) card.classList.add('is-unconfigured');
          else if (!node) card.classList.add('is-stale');

          const row = document.createElement('div');
          row.className = 'node-row';

          const indicator = document.createElement('span');
          indicator.className = `node-indicator ${nodeIndicatorClass(entry, node)}`;
          indicator.setAttribute('aria-hidden', 'true');

          const name = document.createElement('strong');
          name.textContent = displayNodeName(entry);

          row.append(indicator, name);

          const details = document.createElement('div');
          details.className = 'node-details';

          const rssiLine = document.createElement('span');
          rssiLine.textContent = rssi == null ? '-- dBm' : `${Math.round(rssi)} dBm`;

          const ageLine = document.createElement('span');
          ageLine.className = 'node-status';
          if (outsideConfiguredRoom) {
            ageLine.textContent = `${nodeAlertName(entry)} — hors du plan configuré`;
            ageLine.classList.add('is-orange');
          } else if (!entry.configured && active) {
            ageLine.textContent = 'Position non configurée';
            ageLine.classList.add('is-green');
          } else if (!entry.configured) {
            ageLine.textContent = 'HORS LIGNE';
            ageLine.classList.add('is-red');
          } else if (!node) {
            ageLine.textContent = 'HORS LIGNE';
            ageLine.classList.add('is-red');
          } else {
            ageLine.textContent = active ? ageLabel(node) : 'HORS LIGNE';
            ageLine.classList.add(active ? 'is-green' : 'is-red');
          }

          details.append(rssiLine, ageLine);

          const signal = document.createElement('div');
          signal.className = 'signal-bar';
          for (let i = 0; i < 5; i += 1) {
            const segment = document.createElement('span');
            if (i < filled) segment.className = 'is-filled';
            signal.append(segment);
          }

          card.append(row, details, signal);
          els['nodes-list'].append(card);
        });
      }

      function modeValue() {
        if (window.RS.connected) return 'LIVE';
        return '--';
      }

      function renderSystem() {
        els['system-version'].textContent = window.RS.server_version || '--';
        els['system-uptime'].textContent = window.RS.uptime || '--';
        els['system-frame-count'].textContent = window.RS.connected ? String(window.RS.frame_count ?? 0) : '--';
        const mode = modeValue();
        els['system-mode'].textContent = mode;
        els['system-mode'].className = 'mode-badge';
        if (mode === 'LIVE') els['system-mode'].classList.add('is-live');
        else els['system-mode'].classList.add('is-empty');
      }

      function renderRoomConfigBanner() {
        const banner = els['room-config-banner'];
        if (!banner) return;
        banner.hidden = window.RS.room_config_source !== 'default';
      }

      function confidencePercent(person) {
        const raw = safeNumber(person?.confidence);
        if (raw == null) return null;
        return raw <= 1 ? raw * 100 : raw;
      }

      function personColor(person) {
        const confidence = confidencePercent(person);
        if (confidence == null || confidence <= 40) return '#ef4444';
        if (confidence <= 70) return '#f59e0b';
        return '#10b981';
      }

      function updateTrails() {
        window.RS.persons.forEach((person, index) => {
          const id = String(person.id ?? person.person_id ?? person.track_id ?? index + 1);
          const x = safeNumber(person.x ?? person.position?.x ?? person.location?.x);
          const y = safeNumber(person.y ?? person.position?.y ?? person.location?.y);
          if (x == null || y == null) return;
          const list = trails.get(id) || [];
          const last = list[list.length - 1];
          if (!last || Math.abs(last.x - x) > 0.02 || Math.abs(last.y - y) > 0.02) {
            list.push({ x, y });
            while (list.length > 6) list.shift();
            trails.set(id, list);
          }
        });
      }

      function resizeCanvas(canvas) {
        const rect = canvas.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        const width = Math.max(1, Math.round(rect.width * dpr));
        const height = Math.max(1, Math.round(rect.height * dpr));
        if (canvas.width !== width || canvas.height !== height) {
          canvas.width = width;
          canvas.height = height;
        }
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        return { ctx, width: rect.width, height: rect.height };
      }

      function roundRect(ctx, x, y, width, height, radius) {
        const r = Math.min(radius, width / 2, height / 2);
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + width, y, x + width, y + height, r);
        ctx.arcTo(x + width, y + height, x, y + height, r);
        ctx.arcTo(x, y + height, x, y, r);
        ctx.arcTo(x, y, x + width, y, r);
        ctx.closePath();
      }

      function roomToScreen(x, y, options = {}) {
        if (!canvasMetrics) return { x: 0, y: 0 };
        const px = canvasMetrics.roomX + ((x - canvasMetrics.originX) / canvasMetrics.roomW) * canvasMetrics.usableW;
        const py = canvasMetrics.roomY + ((y - canvasMetrics.originY) / canvasMetrics.roomH) * canvasMetrics.usableH;
        const outsideCanvas = px < 0 || px > canvasMetrics.width || py < 0 || py > canvasMetrics.height;
        if (options.entry) logNodeProjection(options.entry, x, y, px, py);
        if (!options.clamp || !outsideCanvas) {
          return { x: px, y: py, rawX: px, rawY: py, outsideCanvas, clamped: false };
        }
        return {
          x: Math.max(0, Math.min(canvasMetrics.width, px)),
          y: Math.max(0, Math.min(canvasMetrics.height, py)),
          rawX: px,
          rawY: py,
          outsideCanvas,
          clamped: true,
        };
      }

      function drawGrid(ctx, metrics) {
        ctx.strokeStyle = '#1f2937';
        ctx.lineWidth = 1;
        ctx.beginPath();
        const startX = Math.ceil(metrics.bounds.minX);
        const endX = Math.floor(metrics.bounds.maxX);
        const startY = Math.ceil(metrics.bounds.minY);
        const endY = Math.floor(metrics.bounds.maxY);
        for (let x = startX; x <= endX; x += 1) {
          const sx = roomToScreen(x, metrics.bounds.minY).x;
          ctx.moveTo(sx, metrics.roomY);
          ctx.lineTo(sx, metrics.roomY + metrics.usableH);
        }
        for (let y = startY; y <= endY; y += 1) {
          const sy = roomToScreen(metrics.bounds.minX, y).y;
          ctx.moveTo(metrics.roomX, sy);
          ctx.lineTo(metrics.roomX + metrics.usableW, sy);
        }
        ctx.stroke();
      }

      function drawRoomPolygon(ctx, boundary) {
        if (!boundary.length) return;
        ctx.beginPath();
        boundary.forEach((point, index) => {
          const p = roomToScreen(point.x, point.y);
          if (index === 0) ctx.moveTo(p.x, p.y);
          else ctx.lineTo(p.x, p.y);
        });
        ctx.closePath();
        ctx.fillStyle = 'rgba(59, 130, 246, 0.08)';
        ctx.fill();
        ctx.strokeStyle = '#374151';
        ctx.lineWidth = 2;
        ctx.stroke();
      }

      function drawNodes(ctx) {
        allNodesForUi().forEach((entry) => {
          const position = nodePosition(entry);
          if (!position) return;
          const x = position.x;
          const y = position.y;
          const active = isNodeActive(entry.state);
          const outsideConfiguredRoom = isOutsideConfiguredRoom(x, y);
          const p = roomToScreen(x, y, { clamp: true, entry });
          const arrow = p.clamped
            ? (p.rawY < 0 || p.rawY > canvasMetrics.height ? '↑' : '→')
            : outOfBoundsArrow(x, y);

          if (active) {
            ctx.beginPath();
            ctx.fillStyle = 'rgba(59, 130, 246, 0.10)';
            ctx.arc(p.x, p.y, 80, 0, Math.PI * 2);
            ctx.fill();
          }

          roundRect(ctx, p.x - 8, p.y - 8, 16, 16, 3);
          ctx.fillStyle = active ? '#3b82f6' : '#374151';
          ctx.fill();
          ctx.strokeStyle = active ? 'rgba(249, 250, 251, 0.42)' : 'rgba(107, 114, 128, 0.35)';
          ctx.stroke();

          ctx.fillStyle = active ? '#f9fafb' : '#9ca3af';
          ctx.font = '600 12px system-ui, sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'bottom';
          ctx.fillText(`${nodeShortLabel(entry)}${active ? '' : ' ✕'}${outsideConfiguredRoom || p.clamped ? ` ${arrow}` : ''}`, p.x, p.y - 14);

          if (active) {
            ctx.beginPath();
            ctx.fillStyle = '#10b981';
            ctx.arc(p.x, p.y - 8, 3, 0, Math.PI * 2);
            ctx.fill();
          }
        });
      }

      function drawPersons(ctx) {
        updateTrails();
        window.RS.persons.forEach((person, index) => {
          const id = String(person.id ?? person.person_id ?? person.track_id ?? index + 1);
          const x = safeNumber(person.x ?? person.position?.x ?? person.location?.x);
          const y = safeNumber(person.y ?? person.position?.y ?? person.location?.y);
          if (x == null || y == null) return;
          const trail = trails.get(id) || [];

          trail.slice(0, -1).slice(-5).forEach((point, trailIndex, points) => {
            const p = roomToScreen(point.x, point.y);
            const alpha = (trailIndex + 1) / (points.length + 1);
            ctx.beginPath();
            ctx.fillStyle = `rgba(16, 185, 129, ${alpha * 0.42})`;
            ctx.arc(p.x, p.y, 8, 0, Math.PI * 2);
            ctx.fill();
          });

          const p = roomToScreen(x, y);
          ctx.beginPath();
          ctx.fillStyle = personColor(person);
          ctx.arc(p.x, p.y, 20, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = 'rgba(249, 250, 251, 0.68)';
          ctx.lineWidth = 2;
          ctx.stroke();

          ctx.fillStyle = '#ffffff';
          ctx.font = '700 12px system-ui, sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(`P${index + 1}`, p.x, p.y);
        });
      }

      function drawScale(ctx, metrics) {
        const rulerMeters = Math.min(metrics.roomW, 3);
        const rulerWidth = (rulerMeters / metrics.roomW) * metrics.usableW;
        const x = Math.max(metrics.roomX, (metrics.width - rulerWidth) / 2);
        const y = metrics.height - 42;
        ctx.strokeStyle = '#6b7280';
        ctx.fillStyle = '#6b7280';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(x + rulerWidth, y);
        for (let i = 0; i <= rulerMeters; i += 1) {
          const tx = x + (i / metrics.roomW) * metrics.usableW;
          ctx.moveTo(tx, y - 5);
          ctx.lineTo(tx, y + 5);
          ctx.fillText(`${i}m`, tx, y + 17);
        }
        ctx.stroke();
      }

      function drawRoomFooter(ctx, metrics) {
        ctx.fillStyle = '#f9fafb';
        ctx.font = '600 12px system-ui, sans-serif';
        ctx.textBaseline = 'bottom';
        ctx.textAlign = 'left';
        const count = window.RS.connected ? String(window.RS.persons.length) : '--';
        ctx.fillText(`${count} personne(s) détectée(s)`, 16, metrics.height - 16);

        ctx.textAlign = 'right';
        const suffix = metrics.zoomedToFit ? ' · zoom-to-fit' : '';
        ctx.fillText(`${metrics.configRoomW.toFixed(1)}m × ${metrics.configRoomH.toFixed(1)}m${suffix}`, metrics.width - 16, metrics.height - 16);
      }

      function syncHalos() {
        const container = els['person-halos'];
        const wanted = new Set();
        window.RS.persons.forEach((person, index) => {
          const x = safeNumber(person.x ?? person.position?.x ?? person.location?.x);
          const y = safeNumber(person.y ?? person.position?.y ?? person.location?.y);
          if (x == null || y == null || !canvasMetrics) return;
          const id = String(person.id ?? person.person_id ?? person.track_id ?? index + 1);
          wanted.add(id);
          let halo = container.querySelector(`[data-person-id="${CSS.escape(id)}"]`);
          if (!halo) {
            halo = document.createElement('span');
            halo.className = 'person-halo';
            halo.dataset.personId = id;
            container.append(halo);
          }
          const p = roomToScreen(x, y);
          halo.style.left = `${p.x}px`;
          halo.style.top = `${p.y}px`;
          halo.classList.toggle('is-high', (confidencePercent(person) ?? 0) > 70);
          halo.classList.toggle('is-mid', (confidencePercent(person) ?? 0) > 40 && (confidencePercent(person) ?? 0) <= 70);
          halo.classList.toggle('is-low', (confidencePercent(person) ?? 0) <= 40);
        });

        [...container.querySelectorAll('.person-halo')].forEach((halo) => {
          if (!wanted.has(halo.dataset.personId)) halo.remove();
        });
      }

      function drawRoom() {
        const canvas = els['room-canvas'];
        const { ctx, width, height } = resizeCanvas(canvas);
        const boundary = roomBoundary();
        const bounds = roomBounds(boundary);
        if (!bounds) {
          ctx.clearRect(0, 0, width, height);
          ctx.fillStyle = '#0d1117';
          ctx.fillRect(0, 0, width, height);
          canvasMetrics = null;
          syncHalos();
          return;
        }
        const margin = ROOM_CANVAS_MARGIN;
        const usableW = Math.max(1, width - margin * 2);
        const usableH = Math.max(1, height - margin * 2);
        const scale = Math.min(usableW / bounds.width, usableH / bounds.height);
        const fittedW = bounds.width * scale;
        const fittedH = bounds.height * scale;
        canvasMetrics = {
          width,
          height,
          canvasWidth: canvas.width,
          canvasHeight: canvas.height,
          configRoomW: bounds.width,
          configRoomH: bounds.height,
          originX: bounds.minX,
          originY: bounds.minY,
          roomW: bounds.width,
          roomH: bounds.height,
          usableW: fittedW,
          usableH: fittedH,
          scale,
          roomX: margin + (usableW - fittedW) / 2,
          roomY: margin + (usableH - fittedH) / 2,
          bounds,
          zoomedToFit: false,
        };

        ctx.clearRect(0, 0, width, height);
        ctx.fillStyle = '#0d1117';
        ctx.fillRect(0, 0, width, height);

        drawGrid(ctx, canvasMetrics);
        drawRoomPolygon(ctx, boundary);

        drawNodes(ctx);
        drawPersons(ctx);
        drawScale(ctx, canvasMetrics);
        drawRoomFooter(ctx, canvasMetrics);
        syncHalos();
      }

      function breathingValue(person) {
        return safeNumber(person?.breathing_bpm ?? person?.breathing_rate_bpm ?? person?.respiration_bpm);
      }

      function motionValue(person) {
        const raw = safeNumber(person?.motion_energy ?? person?.activity ?? person?.motion);
        if (raw == null) return null;
        return Math.max(0, Math.min(100, raw <= 1 ? raw * 100 : raw));
      }

      function activityLabel(percent) {
        if (percent == null) return '--';
        if (percent < 15) return 'IMMOBILE';
        if (percent < 45) return 'PEU ACTIF';
        if (percent < 75) return 'ACTIF';
        return 'TRÈS ACTIF';
      }

      function breathingStatus(person) {
        const bpm = breathingValue(person);
        if (bpm == null) return { label: '--', cls: 'is-empty' };
        const id = String(person.id ?? person.person_id ?? person.track_id ?? 'person');
        if (bpm === 0 && !zeroBreathingSince.has(id)) zeroBreathingSince.set(id, Date.now());
        if (bpm > 0) zeroBreathingSince.delete(id);
        const zeroSince = zeroBreathingSince.get(id);
        if (bpm < 4 || (bpm === 0 && zeroSince && Date.now() - zeroSince > 15000)) {
          return { label: 'APNÉE', cls: 'is-critical' };
        }
        if (bpm < 8) return { label: 'LENT', cls: 'is-warning' };
        if (bpm <= 25) return { label: 'NORMAL', cls: 'is-normal' };
        return { label: 'RAPIDE', cls: 'is-warning' };
      }

      function renderVitals() {
        els['vitals-list'].replaceChildren();
        if (!window.RS.persons.length) {
          const card = document.createElement('article');
          card.className = 'card empty-card';
          card.textContent = '--';
          els['vitals-list'].append(card);
          return;
        }

        window.RS.persons.forEach((person, index) => {
          const id = String(person.id ?? person.person_id ?? person.track_id ?? index + 1);
          const bpm = breathingValue(person);
          const status = breathingStatus(person);
          const motion = motionValue(person);

          if (status.cls === 'is-critical') {
            window.RSAlerts.addAlert('warning', `Respiration critique P${index + 1}`, 'critical', bpm);
          }

          const card = document.createElement('article');
          card.className = 'card vital-card';

          const title = document.createElement('h3');
          title.className = 'person-title';
          title.textContent = `Personne ${index + 1}`;

          const breathing = document.createElement('div');
          breathing.className = 'vital-block';
          const breathingHeading = document.createElement('div');
          breathingHeading.className = 'vital-heading';
          const breathingLabel = document.createElement('span');
          breathingLabel.textContent = 'RESPIRATION';
          const statusBadge = document.createElement('span');
          statusBadge.className = `status-badge ${status.cls}`;
          statusBadge.textContent = status.label;
          breathingHeading.append(breathingLabel, statusBadge);
          const vitalValue = document.createElement('div');
          vitalValue.className = 'vital-value';
          vitalValue.append(document.createTextNode(bpm == null ? '--' : String(Math.round(bpm))));
          const unit = document.createElement('span');
          unit.textContent = 'rpm';
          vitalValue.append(unit);
          const miniSparkline = document.createElement('canvas');
          miniSparkline.className = 'mini-sparkline';
          miniSparkline.width = 100;
          miniSparkline.height = 30;
          miniSparkline.dataset.personId = id;
          miniSparkline.setAttribute('aria-label', 'Historique respiration');
          breathing.append(breathingHeading, vitalValue, miniSparkline);

          const heart = document.createElement('div');
          heart.className = 'vital-block';
          const heartHeading = document.createElement('div');
          heartHeading.className = 'vital-heading';
          const heartLabel = document.createElement('span');
          heartLabel.textContent = 'RYTHME CARDIAQUE';
          const beta = document.createElement('span');
          beta.className = 'beta-badge';
          beta.title = 'Fonctionnalité beta - non fiable';
          beta.textContent = 'BETA';
          heartHeading.append(heartLabel, beta);
          const heartRow = document.createElement('div');
          heartRow.className = 'heart-row';
          heartRow.title = 'Fonctionnalité beta - non fiable';
          heartRow.append(document.createTextNode('❤️ '));
          const heartValue = document.createElement('strong');
          heartValue.textContent = '--';
          const heartUnit = document.createElement('span');
          heartUnit.textContent = 'bpm';
          heartRow.append(heartValue, heartUnit);
          heart.append(heartHeading, heartRow);

          const activity = document.createElement('div');
          activity.className = 'vital-block';
          const progress = document.createElement('div');
          progress.className = 'progress-bar';
          const fill = document.createElement('span');
          fill.style.width = `${motion ?? 0}%`;
          progress.append(fill);
          const label = document.createElement('div');
          label.className = 'activity-label';
          label.textContent = activityLabel(motion);
          const activityHeading = document.createElement('div');
          activityHeading.className = 'vital-heading';
          const activityTitle = document.createElement('span');
          activityTitle.textContent = 'NIVEAU D\'ACTIVITÉ';
          activityHeading.append(activityTitle);
          activity.append(activityHeading, progress, label);

          card.append(title, breathing, heart, activity);
          els['vitals-list'].append(card);
        });

        drawMiniSparklines();
      }

      function drawSparkline(canvas, values, options = {}) {
        const ctx = canvas.getContext('2d');
        const width = canvas.width;
        const height = canvas.height;
        ctx.clearRect(0, 0, width, height);
        ctx.fillStyle = options.background || '#111827';
        ctx.fillRect(0, 0, width, height);
        ctx.strokeStyle = '#1f2937';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(0, height - 1);
        ctx.lineTo(width, height - 1);
        ctx.stroke();

        const numeric = values.map((value) => Number(value)).filter(Number.isFinite);
        if (!numeric.length) return;
        const min = options.min ?? Math.min(...numeric);
        const max = options.max ?? Math.max(...numeric, min + 1);
        ctx.strokeStyle = options.color || '#10b981';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        numeric.forEach((value, index) => {
          const x = numeric.length === 1 ? width : (index / (numeric.length - 1)) * width;
          const y = height - ((value - min) / Math.max(1, max - min)) * (height - 4) - 2;
          if (index === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        });
        ctx.stroke();
      }

      function drawMiniSparklines() {
        els['vitals-list'].querySelectorAll('.mini-sparkline').forEach((canvas) => {
          const values = window.RS.vitals_history[canvas.dataset.personId] || [];
          drawSparkline(canvas, values, { min: 0, max: 30, color: '#10b981', background: '#0d1117' });
        });
      }

      function renderAlerts() {
        const alerts = window.RS.alerts.slice(0, 20);
        els['alerts-count'].textContent = String(alerts.length);
        els['alerts-count'].classList.toggle('is-visible', alerts.length > 0);
        els['alerts-list'].replaceChildren();

        if (!alerts.length) {
          const empty = document.createElement('div');
          empty.className = 'alert-empty';
          empty.textContent = '--';
          els['alerts-list'].append(empty);
          return;
        }

        alerts.forEach((alert) => {
          const row = document.createElement('article');
          row.className = `alert-item severity-${alert.severity || 'info'}`;
          const time = new Date(alert.time || Date.now());
          const icon = alert.severity === 'critical' ? '❌' : alert.severity === 'warning' ? '⚠️' : 'ℹ️';
          const timeEl = document.createElement('time');
          timeEl.textContent = time.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
          const iconEl = document.createElement('span');
          iconEl.textContent = icon;
          const message = document.createElement('strong');
          message.textContent = alert.message || '--';
          row.append(timeEl, iconEl, message);
          els['alerts-list'].append(row);
        });
      }

      function drawTrends() {
        const canvas = els['trends-canvas'];
        const ctx = canvas.getContext('2d');
        const width = canvas.width;
        const height = canvas.height;
        const pad = { left: 24, right: 4, top: 6, bottom: 16 };
        ctx.clearRect(0, 0, width, height);
        ctx.fillStyle = '#111827';
        ctx.fillRect(0, 0, width, height);

        ctx.strokeStyle = '#1f2937';
        ctx.lineWidth = 1;
        ctx.beginPath();
        for (let y = 0; y <= 3; y += 1) {
          const py = pad.top + y * ((height - pad.top - pad.bottom) / 3);
          ctx.moveTo(pad.left, py);
          ctx.lineTo(width - pad.right, py);
        }
        ctx.stroke();

        ctx.fillStyle = '#6b7280';
        ctx.font = '9px system-ui, sans-serif';
        ctx.textAlign = 'right';
        ctx.textBaseline = 'middle';
        [0, 10, 20, 30].forEach((tick) => {
          const py = height - pad.bottom - (tick / 30) * (height - pad.top - pad.bottom);
          ctx.fillText(String(tick), pad.left - 4, py);
        });

        const thresholdY = height - pad.bottom - (4 / 30) * (height - pad.top - pad.bottom);
        ctx.strokeStyle = '#ef4444';
        ctx.setLineDash([4, 3]);
        ctx.beginPath();
        ctx.moveTo(pad.left, thresholdY);
        ctx.lineTo(width - pad.right, thresholdY);
        ctx.stroke();
        ctx.setLineDash([]);

        const cutoff = Date.now() - 10 * 60 * 1000;
        const points = window.RS.breathing_history
          .filter((point) => point && point.time >= cutoff && Number.isFinite(Number(point.value)))
          .slice(-240);

        if (trendMode === 'breathing' && points.length) {
          ctx.strokeStyle = '#10b981';
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          points.forEach((point, index) => {
            const x = pad.left + (index / Math.max(1, points.length - 1)) * (width - pad.left - pad.right);
            const y = height - pad.bottom - (Math.max(0, Math.min(30, point.value)) / 30) * (height - pad.top - pad.bottom);
            if (index === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
          });
          ctx.stroke();
        }

        ctx.fillStyle = '#6b7280';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'alphabetic';
        ctx.fillText('-10min', pad.left, height - 4);
        ctx.textAlign = 'right';
        ctx.fillText('maintenant', width - pad.right, height - 4);
      }

      function renderAll() {
        setStatus();
        renderNodes();
        renderSystem();
        renderRoomConfigBanner();
        drawRoom();
        renderVitals();
        renderAlerts();
        drawTrends();
      }

      async function runAction(button, payload) {
        button.disabled = true;
        els['action-status'].replaceChildren();
        const spinner = document.createElement('span');
        spinner.className = 'spinner';
        spinner.setAttribute('aria-hidden', 'true');
        els['action-status'].append(spinner, document.createTextNode(' En cours'));
        const started = Date.now();
        const result = await window.RSApi.postConfig(payload);
        const remaining = Math.max(0, 3000 - (Date.now() - started));
        window.setTimeout(() => {
          els['action-status'].textContent = result.ok ? 'OK' : 'Erreur';
          button.disabled = false;
        }, remaining);
      }

      async function loadRoomConfigForDashboard() {
        const apiConfig = await window.RSApi?.loadRoomConfig?.();
        return normalizeRoomConfig(apiConfig);
      }

      function bindEvents() {
        const scheduleRender = () => {
          const now = performance.now();
          if (now - lastRenderAt < 80) return;
          lastRenderAt = now;
          renderAll();
        };
        window.RuvSenseWS?.onUpdate(scheduleRender);
        window.addEventListener('rs:update', scheduleRender);
        window.addEventListener('resize', drawRoom);
        if (window.ResizeObserver && els['room-canvas']) {
          roomResizeObserver = new ResizeObserver(() => {
            window.requestAnimationFrame(drawRoom);
          });
          roomResizeObserver.observe(els['room-canvas']);
        }
        els['view-3d-button'].addEventListener('click', () => {
          window.open('/ui/observatory.html', '_blank');
        });
        els['clear-alerts-button'].addEventListener('click', () => {
          window.RSAlerts.clearAlerts();
        });
        els['trend-tab-breathing'].addEventListener('click', () => {
          trendMode = 'breathing';
          drawTrends();
        });
        els['recalibrate-button'].addEventListener('click', () => {
          runAction(els['recalibrate-button'], { recalibrate: true });
        });
        els['reload-modules-button'].addEventListener('click', () => {
          runAction(els['reload-modules-button'], { reload_modules: true });
        });
      }

      async function loadInitialData() {
        try {
          const config = await loadRoomConfigForDashboard();
          window.RS.room_config = config || EMPTY_ROOM_CONFIG;
          window.RS.room_config_source = config ? 'api' : 'default';
        } catch {
          window.RS.room_config = EMPTY_ROOM_CONFIG;
          window.RS.room_config_source = 'default';
        }

        const [version, features] = await Promise.all([
          window.RSApi.getVersion(),
          window.RSApi.getFeatures(),
        ]);
        if (version) window.RS.server_version = version;
        if (features) window.RS.features = features;
        dispatchUpdate();
      }

      function animationLoop() {
        drawRoom();
        drawTrends();
        requestAnimationFrame(animationLoop);
      }

      function init() {
        getElements();
        updateClock();
        window.setInterval(updateClock, 1000);
        bindEvents();
        renderAll();
        loadInitialData();
        window.RuvSenseWS?.connect(window.RUVSENSE_CONFIG?.api_base);
        animationLoop();
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init, { once: true });
      } else {
        init();
      }
    })();
  </script>
</body>
