<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0e1a">
  <meta name="description" content="Paramètres RuvSense Edge">
  <title>Paramètres RuvSense</title>
  <link rel="stylesheet" href="style.css">
  <style>html,body{min-height:100%;overflow:auto}
.settings-header-shell{grid-template-columns:var(--left-column-width) minmax(0,1fr) minmax(220px,var(--right-column-width))}
.settings-title-strip,.settings-header-actions{min-width:0;display:inline-flex;align-items:center;gap:10px;padding-inline:var(--column-padding)}
.settings-title-strip{justify-content:center;color:var(--text-secondary);font-size:13px}.settings-header-actions{justify-content:flex-end;gap:12px}
.settings-console-link,.settings-button{min-height:34px;display:inline-flex;align-items:center;justify-content:center;border:1px solid rgba(59,130,246,.72);border-radius:6px;background:transparent;color:var(--accent);cursor:pointer;padding:7px 12px;font-weight:800;text-decoration:none}
.settings-console-link{min-height:30px;font-size:12px}.settings-console-link:hover,.settings-button:hover{background:rgba(59,130,246,.12)}.settings-button.is-primary{background:rgba(59,130,246,.18);color:var(--text-primary)}.settings-button:disabled{cursor:wait;opacity:.58}
.settings-layout{min-height:calc(100vh - var(--header-height));display:grid;grid-template-columns:var(--left-column-width) minmax(0,1fr);background:var(--bg-darker)}
.settings-nav{display:flex;flex-direction:column;gap:var(--gap);border-right:1px solid var(--border);background:var(--bg-card);padding:var(--column-padding)}.settings-tab-list{display:grid;gap:6px}
.settings-tab{min-height:38px;display:inline-flex;align-items:center;justify-content:flex-start;border:1px solid var(--border);border-radius:6px;background:var(--bg-darker);color:var(--text-secondary);cursor:pointer;padding:8px 10px;font-size:12px;font-weight:800;text-align:left}.settings-tab:hover,.settings-tab.is-active{border-color:rgba(59,130,246,.72);background:rgba(59,130,246,.12);color:var(--text-primary)}
.settings-content{min-width:0;overflow:auto;padding:16px}.settings-panel{display:none;gap:14px;max-width:1180px;margin:0 auto}.settings-panel.is-active{display:grid}.settings-panel-head{display:flex;align-items:center;justify-content:space-between;gap:12px}.settings-panel-title{margin:0;color:var(--text-primary);font-size:22px;line-height:1.15}.settings-action-row{display:flex;flex-wrap:wrap;justify-content:flex-end;gap:8px}
.settings-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.settings-form-card,.node-settings-card{align-content:start}.settings-form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.settings-field{min-width:0;display:grid;gap:5px}.settings-field.is-wide{grid-column:1/-1}
.settings-field label,.settings-check span{color:var(--text-secondary);font-size:11px;font-weight:800;text-transform:uppercase}.settings-field input,.settings-field select{width:100%;min-height:36px;border:1px solid var(--border);border-radius:6px;background:var(--bg-darker);color:var(--text-primary);padding:7px 9px;font:inherit;font-size:13px}.settings-field input:focus,.settings-field select:focus{border-color:rgba(59,130,246,.78);outline:0;box-shadow:0 0 0 3px rgba(59,130,246,.12)}
.settings-check{min-height:36px;display:flex;align-items:center;gap:8px;border:1px solid var(--border);border-radius:6px;background:var(--bg-darker);padding:7px 9px}.settings-check input{width:16px;height:16px;accent-color:var(--accent)}.settings-status-line{min-height:22px;color:var(--text-secondary);font-size:12px;font-weight:700}.settings-status-line.is-ok{color:var(--accent-health)}.settings-status-line.is-error{color:var(--alert-red)}
.room-preview-canvas{width:100%;height:260px;display:block;border:1px solid var(--border);border-radius:8px;background:var(--bg-darker)}.node-settings-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px}.node-settings-head{display:flex;align-items:center;justify-content:space-between;gap:8px}.node-settings-head h3{min-width:0;margin:0;overflow:hidden;color:var(--text-primary);font-size:14px;text-overflow:ellipsis;white-space:nowrap}
.node-live-badge{min-height:20px;display:inline-flex;align-items:center;border-radius:999px;background:rgba(16,185,129,.14);color:var(--accent-health);padding:2px 7px;font-size:10px;font-weight:900}.node-live-canvas{width:200px;height:200px;justify-self:center;display:block;border:1px solid var(--border);border-radius:8px;background:var(--bg-darker)}.node-coordinate-row{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
.connection-result{display:grid;gap:8px}.connection-readout{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}.readout-cell{border:1px solid var(--border);border-radius:8px;background:var(--bg-darker);padding:10px}.readout-cell span{display:block;color:var(--text-secondary);font-size:11px;font-weight:800;text-transform:uppercase}.readout-cell strong{display:block;min-width:0;margin-top:4px;overflow:hidden;color:var(--text-primary);font-size:13px;text-overflow:ellipsis;white-space:nowrap}
@media (max-width:860px){.settings-header-shell,.settings-layout{grid-template-columns:1fr}.settings-title-strip,.settings-header-actions{justify-content:flex-start}.settings-nav{border-right:0;border-bottom:1px solid var(--border)}.settings-tab-list{grid-template-columns:repeat(2,minmax(0,1fr))}.settings-grid,.settings-form-grid,.connection-readout{grid-template-columns:1fr}.settings-panel-head{align-items:stretch;flex-direction:column}.settings-action-row{justify-content:stretch}.settings-button{flex:1}}</style>
</head>
<body>
  <header class="app-header settings-header-shell">
    <div class="brand" aria-label="Paramètres RuvSense">
      <span id="settings-connection-dot" class="status-dot is-offline" aria-hidden="true"></span>
      <span class="brand-name">RuvSense</span>
    </div>
    <div class="settings-title-strip" aria-live="polite">
      <span class="live-badge is-online">PARAMÈTRES</span>
      <span id="settings-host-summary">localhost:3000</span>
    </div>
    <div class="settings-header-actions">
      <a class="settings-console-link" href="index.html">Console</a>
      <time id="settings-clock" class="header-clock" datetime="">--:--:--</time>
    </div>
  </header>
  <main class="settings-layout">
    <aside class="settings-nav" aria-label="Onglets paramètres">
      <section class="panel-section" aria-labelledby="settings-nav-title">
        <h2 id="settings-nav-title" class="section-title">⚙️ PARAMÈTRES</h2>
        <div class="settings-tab-list" role="tablist" aria-label="Sections paramètres">
          <button id="tab-button-room" class="settings-tab is-active" type="button" role="tab" aria-selected="true" aria-controls="tab-room" data-tab="room">Pièce &amp; Nœuds</button>
          <button id="tab-button-connection" class="settings-tab" type="button" role="tab" aria-selected="false" aria-controls="tab-connection" data-tab="connection">Connexion</button>
          <button id="tab-button-alerts" class="settings-tab" type="button" role="tab" aria-selected="false" aria-controls="tab-alerts" data-tab="alerts">Alertes</button>
          <button id="tab-button-display" class="settings-tab" type="button" role="tab" aria-selected="false" aria-controls="tab-display" data-tab="display">Affichage</button>
        </div>
      </section>
    </aside>
    <section class="settings-content">
      <section id="tab-room" class="settings-panel is-active" role="tabpanel" aria-labelledby="tab-button-room">
        <div class="settings-panel-head">
          <h1 class="settings-panel-title">Pièce &amp; Nœuds</h1>
          <div class="settings-action-row">
            <button id="room-reset-button" class="settings-button" type="button">Réinitialiser</button>
            <button id="room-save-button" class="settings-button is-primary" type="button">Sauvegarder</button>
          </div>
        </div>
        <div class="settings-grid">
          <section class="card settings-form-card" aria-labelledby="room-dimensions-title">
            <h2 id="room-dimensions-title" class="section-title">PIÈCE</h2>
            <div class="settings-form-grid">
              <div class="settings-field">
                <label for="room-width-input">Largeur (mètres)</label>
              <input id="room-width-input" type="number" min="1" max="30" step="0.1" inputmode="decimal">
              </div>
              <div class="settings-field">
                <label for="room-height-input">Hauteur (mètres)</label>
              <input id="room-height-input" type="number" min="1" max="30" step="0.1" inputmode="decimal">
              </div>
            </div>
            <p id="room-status" class="settings-status-line" aria-live="polite">--</p>
          </section>
          <section class="card settings-form-card" aria-labelledby="room-preview-title">
            <h2 id="room-preview-title" class="section-title">APERÇU LIVE</h2>
            <canvas id="room-preview-canvas" class="room-preview-canvas" width="520" height="260" aria-label="Aperçu live de la pièce"></canvas>
          </section>
        </div>
        <section class="panel-section" aria-labelledby="nodes-config-title">
          <h2 id="nodes-config-title" class="section-title">6 NŒUDS</h2>
          <div id="node-settings-grid" class="node-settings-grid" aria-live="polite"></div>
        </section>
      </section>
      <section id="tab-connection" class="settings-panel" role="tabpanel" aria-labelledby="tab-button-connection" hidden>
        <div class="settings-panel-head">
          <h1 class="settings-panel-title">Connexion</h1>
          <div class="settings-action-row">
            <button id="connection-test-button" class="settings-button" type="button">Tester</button>
            <button id="connection-save-button" class="settings-button is-primary" type="button">Sauvegarder</button>
          </div>
        </div>
        <div class="settings-grid">
          <section class="card settings-form-card" aria-labelledby="connection-host-title">
            <h2 id="connection-host-title" class="section-title">MASTER</h2>
            <div class="settings-form-grid">
              <div class="settings-field">
                <label for="connection-ip-input">IP du serveur</label>
                <input id="connection-ip-input" type="text" autocomplete="hostname" spellcheck="false">
              </div>
              <div class="settings-field">
                <label for="connection-port-input">Port API</label>
                <input id="connection-port-input" type="number" min="1" max="65535" step="1" inputmode="numeric">
              </div>
            </div>
            <p id="connection-status" class="settings-status-line" aria-live="polite">--</p>
          </section>
          <section class="card connection-result" aria-labelledby="connection-result-title">
            <h2 id="connection-result-title" class="section-title">VERSION</h2>
            <div class="connection-readout">
              <div class="readout-cell">
                <span>État</span>
                <strong id="connection-state">--</strong>
              </div>
              <div class="readout-cell">
                <span>Version</span>
                <strong id="connection-version">--</strong>
              </div>
              <div class="readout-cell">
                <span>URL</span>
                <strong id="connection-url">--</strong>
              </div>
            </div>
          </section>
        </div>
      </section>
      <section id="tab-alerts" class="settings-panel" role="tabpanel" aria-labelledby="tab-button-alerts" hidden>
        <div class="settings-panel-head">
          <h1 class="settings-panel-title">Alertes</h1>
          <div class="settings-action-row">
            <button id="alerts-save-button" class="settings-button is-primary" type="button">Sauvegarder</button>
          </div>
        </div>
        <section class="card settings-form-card" aria-labelledby="alerts-rules-title">
          <h2 id="alerts-rules-title" class="section-title">SEUILS</h2>
          <div class="settings-form-grid">
            <label class="settings-check">
              <input id="alerts-sound-input" type="checkbox">
              <span>Sons activés</span>
            </label>
            <div class="settings-field is-wide">
              <label for="alerts-apnea-input">Seuil apnée <output id="alerts-apnea-value" for="alerts-apnea-input">15s</output></label>
              <input id="alerts-apnea-input" type="range" min="10" max="60" step="1">
            </div>
            <div class="settings-field is-wide">
              <label for="alerts-no-motion-input">Seuil sans mouvement <output id="alerts-no-motion-value" for="alerts-no-motion-input">120s</output></label>
              <input id="alerts-no-motion-input" type="range" min="60" max="300" step="1">
            </div>
            <div class="settings-field is-wide">
              <label for="alerts-confidence-input">Seuil confiance respiration <output id="alerts-confidence-value" for="alerts-confidence-input">0.3</output></label>
              <input id="alerts-confidence-input" type="range" min="0.1" max="0.9" step="0.1">
            </div>
          </div>
          <p id="alerts-status" class="settings-status-line" aria-live="polite">--</p>
        </section>
      </section>
      <section id="tab-display" class="settings-panel" role="tabpanel" aria-labelledby="tab-button-display" hidden>
        <div class="settings-panel-head">
          <h1 class="settings-panel-title">Affichage</h1>
          <div class="settings-action-row">
            <button id="display-save-button" class="settings-button is-primary" type="button">Sauvegarder</button>
          </div>
        </div>
        <section class="card settings-form-card" aria-labelledby="display-options-title">
          <h2 id="display-options-title" class="section-title">CONSOLE</h2>
          <div class="settings-form-grid">
            <div class="settings-field is-wide">
              <label for="display-fps-input">FPS canvas <output id="display-fps-value" for="display-fps-input">10 FPS</output></label>
              <input id="display-fps-input" type="range" min="0" max="3" step="1">
            </div>
            <label class="settings-check">
              <input id="display-grid-input" type="checkbox">
              <span>Afficher la grille</span>
            </label>
            <label class="settings-check">
              <input id="display-node-ranges-input" type="checkbox">
              <span>Afficher les zones de portée des nœuds</span>
            </label>
            <label class="settings-check">
              <input id="display-trail-input" type="checkbox">
              <span>Afficher la traînée de position</span>
            </label>
          </div>
          <p id="display-status" class="settings-status-line" aria-live="polite">--</p>
        </section>
      </section>
    </section>
  </main>
  <script src="settings.js"></script>
</body>
</html>
