name: RuvSense Full Pipeline Integration

on:
  workflow_dispatch: {}


permissions:
  contents: read

concurrency:
  group: ruvsense-full-pipeline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  full-pipeline:
    name: Docker simulation full pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest requests

      - name: Show Docker versions
        run: |
          docker version
          docker compose version

      - name: Run full pipeline integration test
        env:
          CSI_SOURCE: simulate
          RUVSENSE_ENABLE_SIMULATION: "true"
        run: |
          python -m pytest tests/integration/test_full_pipeline.py -o addopts="" -s
